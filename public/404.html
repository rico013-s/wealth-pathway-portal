<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // SPA redirect: preserve the path so React Router can handle it
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        window.location.origin + '/?redirect=' + encodeURIComponent(path + search + hash)
      );
    </script>
  </head>
  <body></body>
</html>
